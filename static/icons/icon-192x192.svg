<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="192" height="192" rx="38" fill="url(#bg2)"/>
  <!-- Gradient accent circle -->
  <circle cx="96" cy="96" r="72" fill="url(#bg)" opacity="0.15"/>
