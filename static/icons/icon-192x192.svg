  <line x1="96" y1="44" x2="96" y2="41" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  <line x1="96" y1="147" x2="96" y2="150" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="96" x2="41" y2="96" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  <line x1="147" y1="96" x2="150" y2="96" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
