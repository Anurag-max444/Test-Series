<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="144" height="144" rx="28" fill="url(#bg2)"/>
  <!-- Gradient accent circle -->
  <circle cx="72" cy="72" r="54" fill="url(#bg)" opacity="0.15"/>
  <!-- Target / Quiz icon -->
  <circle cx="72" cy="72" r="46" fill="none" stroke="url(#bg)" stroke-width="3"/>
  <circle cx="72" cy="72" r="25" fill="none" stroke="#4f8ef7" stroke-width="2"/>
  <circle cx="72" cy="72" r="5" fill="#4f8ef7"/>
  <!-- Crosshair lines -->
  <line x1="72" y1="32" x2="72" y2="32" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="111" x2="72" y2="112" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="72" x2="32" y2="72" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <line x1="111" y1="72" x2="112" y2="72" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
</svg>