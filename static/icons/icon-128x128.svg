<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="128" height="128" rx="25" fill="url(#bg2)"/>
  <!-- Gradient accent circle -->
  <circle cx="64" cy="64" r="48" fill="url(#bg)" opacity="0.15"/>
  <!-- Target / Quiz icon -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="url(#bg)" stroke-width="3"/>
  <circle cx="64" cy="64" r="23" fill="none" stroke="#4f8ef7" stroke-width="2"/>
  <circle cx="64" cy="64" r="4" fill="#4f8ef7"/>
  <!-- Crosshair lines -->
  <line x1="64" y1="30" x2="64" y2="27" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="98" x2="64" y2="100" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="64" x2="27" y2="64" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="64" x2="100" y2="64" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
</svg>