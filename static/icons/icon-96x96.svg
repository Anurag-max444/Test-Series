  <line x1="48" y1="73" x2="48" y2="75" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="48" x2="20" y2="48" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round"/>
  <line x1="73" y1="48" x2="75" y2="48" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round"/>
