<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" rx="13" fill="url(#bg2)"/>
  <!-- Gradient accent circle -->
  <circle cx="32" cy="32" r="24" fill="url(#bg)" opacity="0.15"/>
  <!-- Target / Quiz icon -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#bg)" stroke-width="2"/>
  <circle cx="32" cy="32" r="11" fill="none" stroke="#4f8ef7" stroke-width="1"/>
  <circle cx="32" cy="32" r="3" fill="#4f8ef7"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="19" x2="32" y2="14" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round"/>
  <line x1="32" y1="45" x2="32" y2="50" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round"/>
  <line x1="19" y1="32" x2="14" y2="32" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round"/>
  <line x1="45" y1="32" x2="50" y2="32" stroke="#4f8ef7" stroke-width="1" stroke-linecap="round"/>
</svg>